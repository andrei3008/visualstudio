# ============================================================================
# DOCKER COMPOSE - PRODUCTION
# ============================================================================
# Trage imaginea din GHCR (construita de CI/CD).
# Local:  docker compose -f docker-compose.prod.yml up -d
# Server: paste in Portainer Stacks
# ============================================================================

name: visualstudio-prod

services:
  web-prod:
    image: ghcr.io/andrei3008/visualstudio:latest
    ports:
      - "8007:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - AUTH_SECRET=${AUTH_SECRET:-change-me-to-a-long-random-string-at-least-32-chars}
      - AUTH_TRUST_HOST=true
    volumes:
      - vs-data:/app/data
    restart: unless-stopped

volumes:
  vs-data:
