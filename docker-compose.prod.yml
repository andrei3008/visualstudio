# ============================================================================
# DOCKER COMPOSE - PRODUCTION
# ============================================================================
# Această configurație este pentru PRODUCȚIE (Portainer)
#
# Porturi:
#   - Web: http://localhost:8007
#
# Comenzi:
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================================================

services:
  web:
    image: ghcr.io/andrei3008/visualstudio:latest
    container_name: visualstudio-web
    ports:
      - "8007:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/data/prod.db
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
    volumes:
      - visualstudio-data:/app/data
    networks:
      - visualstudio-net

networks:
  visualstudio-net:
    driver: bridge

volumes:
  visualstudio-data:
