# ============================================================================
# DOCKER COMPOSE - PRODUCTION
# ============================================================================
# Această configurație este pentru PRODUCȚIE (Portainer)
#
# Porturi:
#   - Web: http://localhost:8007
#
# Comenzi:
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================================================

services:
  web:
    image: ghcr.io/andrei3008/visualstudio:latest
    container_name: visualstudio-web
    ports:
      - "8007:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/data/prod.db
      - AUTH_SECRET=1e9b6483d87aa60e5e7f68e91f86e3a10adc851cc347d5813da71b18dbb6acd8
      - AUTH_URL=https://visualstudio.ro
    volumes:
      - visualstudio-data:/app/data
    networks:
      - visualstudio-net

networks:
  visualstudio-net:
    driver: bridge

volumes:
  visualstudio-data:
